controller:
  image:
    tag: "2.504.2-jdk17"
  installPlugins:
    - kubernetes
    - workflow-aggregator
    - git
    - credentials-binding
    - configuration-as-code
  installLatestPlugins: false
  serviceType: LoadBalancer
  admin:
    username: admin
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi
  JCasC:
    configScripts:
      kubernetes-cloud: |
        jenkins:
          clouds:
          - kubernetes:
              name: "kubernetes"
              serverUrl: "https://kubernetes.default"
              namespace: "jenkins"
              jenkinsUrl: "http://jenkins.jenkins.svc.cluster.local:8080"
              jenkinsTunnel: "jenkins-agent.jenkins.svc.cluster.local:50000"
              containerCapStr: "10"
              connectTimeout: 5
              readTimeout: 15

agent:
  enabled: false

persistence:
  enabled: false

serviceAccount:
  create: true
  name: jenkins
